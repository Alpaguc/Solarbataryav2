<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Gradients for modern look -->
    <radialGradient id="sunGradient" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="70%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </radialGradient>
    
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    
    <linearGradient id="batteryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="120" cy="120" r="115" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Sun with rays -->
  <g transform="translate(120, 80)">
    <!-- Sun rays -->
    <g stroke="url(#sunGradient)" stroke-width="4" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-45" x2="0" y2="-55"/>
      <line x1="32" y1="-32" x2="39" y2="-39"/>
      <line x1="45" y1="0" x2="55" y2="0"/>
      <line x1="32" y1="32" x2="39" y2="39"/>
      <line x1="0" y1="45" x2="0" y2="55"/>
      <line x1="-32" y1="32" x2="-39" y2="39"/>
      <line x1="-45" y1="0" x2="-55" y2="0"/>
      <line x1="-32" y1="-32" x2="-39" y2="-39"/>
    </g>
    <!-- Sun core -->
    <circle r="28" fill="url(#sunGradient)" filter="url(#shadow)"/>
    <!-- Sun inner highlight -->
    <circle r="20" fill="rgba(255,255,255,0.3)" cx="-8" cy="-8"/>
  </g>
  
  <!-- Solar panel array -->
  <g transform="translate(120, 140)">
    <!-- Panel grid background -->
    <rect x="-45" y="-15" width="90" height="30" fill="rgba(0,0,0,0.1)" rx="4"/>
    
    <!-- Individual panels -->
    <g fill="url(#panelGradient)" stroke="rgba(255,255,255,0.2)" stroke-width="1">
      <!-- Top row -->
      <rect x="-42" y="-12" width="26" height="12" rx="2" filter="url(#shadow)"/>
      <rect x="-13" y="-12" width="26" height="12" rx="2" filter="url(#shadow)"/>
      <rect x="16" y="-12" width="26" height="12" rx="2" filter="url(#shadow)"/>
      
      <!-- Bottom row -->
      <rect x="-42" y="2" width="26" height="12" rx="2" filter="url(#shadow)"/>
      <rect x="-13" y="2" width="26" height="12" rx="2" filter="url(#shadow)"/>
      <rect x="16" y="2" width="26" height="12" rx="2" filter="url(#shadow)"/>
    </g>
    
    <!-- Panel grid lines for detail -->
    <g stroke="rgba(255,255,255,0.3)" stroke-width="0.5">
      <!-- Vertical lines -->
      <line x1="-16" y1="-12" x2="-16" y2="14"/>
      <line x1="13" y1="-12" x2="13" y2="14"/>
      <!-- Horizontal line -->
      <line x1="-42" y1="0" x2="42" y2="0"/>
    </g>
  </g>
  
  <!-- Battery -->
  <g transform="translate(120, 190)">
    <!-- Battery body -->
    <rect x="-20" y="-18" width="40" height="32" rx="6" fill="url(#batteryGradient)" filter="url(#shadow)"/>
    <!-- Battery terminal -->
    <rect x="-8" y="-24" width="16" height="8" rx="3" fill="url(#batteryGradient)"/>
    
    <!-- Battery level indicator -->
    <rect x="-16" y="-14" width="32" height="6" rx="2" fill="rgba(255,255,255,0.9)"/>
    <rect x="-16" y="-6" width="32" height="6" rx="2" fill="rgba(255,255,255,0.7)"/>
    <rect x="-16" y="2" width="32" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
    
    <!-- Plus symbol -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-8" x2="0" y2="8"/>
      <line x1="-8" y1="0" x2="8" y2="0"/>
    </g>
  </g>
  
  <!-- Energy flow lines (connecting elements) -->
  <g stroke="#FCD34D" stroke-width="2" stroke-dasharray="4,4" opacity="0.6">
    <!-- Sun to panels -->
    <path d="M 120 108 Q 120 118 120 125" fill="none"/>
    <!-- Panels to battery -->
    <path d="M 120 155 Q 120 165 120 172" fill="none"/>
  </g>
</svg>
